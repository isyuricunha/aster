name: aster

x-api-environment: &api-environment
  APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
  DATABASE_URL: ${DATABASE_URL:-}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-aster}
  POSTGRES_USER: ${POSTGRES_USER:-aster}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aster}
  ASTER_ENCRYPTION_KEY: ${ASTER_ENCRYPTION_KEY}
  ASTER_CORS_ORIGINS: ${ASTER_CORS_ORIGINS:-http://localhost:3000}
  ASTER_ENDPOINT_TIMEOUT_SECONDS: ${ASTER_ENDPOINT_TIMEOUT_SECONDS:-30}
  ASTER_STREAM_TIMEOUT_SECONDS: ${ASTER_STREAM_TIMEOUT_SECONDS:-120}
  ASTER_SESSION_COOKIE_NAME: ${ASTER_SESSION_COOKIE_NAME:-aster_session}
  ASTER_SESSION_SECURE: ${ASTER_SESSION_SECURE:-false}
  ASTER_SESSION_ABSOLUTE_DAYS: ${ASTER_SESSION_ABSOLUTE_DAYS:-30}
  ASTER_SESSION_IDLE_HOURS: ${ASTER_SESSION_IDLE_HOURS:-168}
  ASTER_SESSION_TOUCH_SECONDS: ${ASTER_SESSION_TOUCH_SECONDS:-300}
  ASTER_LOGIN_ATTEMPTS: ${ASTER_LOGIN_ATTEMPTS:-5}
  ASTER_LOGIN_WINDOW_SECONDS: ${ASTER_LOGIN_WINDOW_SECONDS:-300}
  ASTER_MCP_STDIO_ENABLED: ${ASTER_MCP_STDIO_ENABLED:-false}
  ASTER_MCP_TIMEOUT_SECONDS: ${ASTER_MCP_TIMEOUT_SECONDS:-30}
  ASTER_TOOL_MAX_ROUNDS: ${ASTER_TOOL_MAX_ROUNDS:-8}
  ASTER_TOOL_ARGUMENT_MAX_CHARACTERS: ${ASTER_TOOL_ARGUMENT_MAX_CHARACTERS:-100000}
  ASTER_TOOL_RESULT_MAX_CHARACTERS: ${ASTER_TOOL_RESULT_MAX_CHARACTERS:-100000}
  ASTER_MEMORY_MAX_ITEMS: ${ASTER_MEMORY_MAX_ITEMS:-12}
  ASTER_MEMORY_SUGGESTION_MAX_ITEMS: ${ASTER_MEMORY_SUGGESTION_MAX_ITEMS:-8}
  ASTER_RAG_MAX_SOURCES: ${ASTER_RAG_MAX_SOURCES:-8}
  ASTER_RAG_CONTEXT_MAX_CHARACTERS: ${ASTER_RAG_CONTEXT_MAX_CHARACTERS:-24000}
  ASTER_RAG_CANDIDATE_LIMIT: ${ASTER_RAG_CANDIDATE_LIMIT:-2000}
  ASTER_DOCUMENT_MAX_BYTES: ${ASTER_DOCUMENT_MAX_BYTES:-5000000}
  ASTER_DOCUMENT_MAX_CHARACTERS: ${ASTER_DOCUMENT_MAX_CHARACTERS:-2000000}
  ASTER_DOCUMENT_CHUNK_CHARACTERS: ${ASTER_DOCUMENT_CHUNK_CHARACTERS:-1600}
  ASTER_DOCUMENT_CHUNK_OVERLAP: ${ASTER_DOCUMENT_CHUNK_OVERLAP:-200}
  ASTER_DOCUMENT_MAX_CHUNKS: ${ASTER_DOCUMENT_MAX_CHUNKS:-2000}
  ASTER_EMBEDDING_BATCH_SIZE: ${ASTER_EMBEDDING_BATCH_SIZE:-64}
  ASTER_MEDIA_ROOT: ${ASTER_MEDIA_ROOT:-/var/lib/aster/media}
  ASTER_IMAGE_TIMEOUT_SECONDS: ${ASTER_IMAGE_TIMEOUT_SECONDS:-300}
  ASTER_IMAGE_UPLOAD_MAX_BYTES: ${ASTER_IMAGE_UPLOAD_MAX_BYTES:-20000000}
  ASTER_IMAGE_OUTPUT_MAX_BYTES: ${ASTER_IMAGE_OUTPUT_MAX_BYTES:-25000000}
  ASTER_IMAGE_MAX_PIXELS: ${ASTER_IMAGE_MAX_PIXELS:-40000000}
  ASTER_IMAGE_MAX_INPUTS: ${ASTER_IMAGE_MAX_INPUTS:-8}
  ASTER_IMAGE_MAX_OUTPUTS: ${ASTER_IMAGE_MAX_OUTPUTS:-4}
  ASTER_AUTOMATION_POLL_SECONDS: ${ASTER_AUTOMATION_POLL_SECONDS:-2}
  ASTER_AUTOMATION_LEASE_SECONDS: ${ASTER_AUTOMATION_LEASE_SECONDS:-120}
  ASTER_AUTOMATION_HEARTBEAT_SECONDS: ${ASTER_AUTOMATION_HEARTBEAT_SECONDS:-30}
  ASTER_AUTOMATION_SCHEDULER_BATCH_SIZE: ${ASTER_AUTOMATION_SCHEDULER_BATCH_SIZE:-25}
  ASTER_AUTOMATION_OUTPUT_MAX_CHARACTERS: ${ASTER_AUTOMATION_OUTPUT_MAX_CHARACTERS:-100000}
  ASTER_INTEGRATION_TIMEOUT_SECONDS: ${ASTER_INTEGRATION_TIMEOUT_SECONDS:-30}
  ASTER_WEBHOOK_MAX_BYTES: ${ASTER_WEBHOOK_MAX_BYTES:-1000000}
  ASTER_COMMUNICATION_LEASE_SECONDS: ${ASTER_COMMUNICATION_LEASE_SECONDS:-180}
  ASTER_COMMUNICATION_MESSAGE_MAX_CHARACTERS: ${ASTER_COMMUNICATION_MESSAGE_MAX_CHARACTERS:-200000}
  ASTER_COMMUNICATION_ATTACHMENT_MAX_BYTES: ${ASTER_COMMUNICATION_ATTACHMENT_MAX_BYTES:-15000000}
  ASTER_COMMUNICATION_MAX_ATTACHMENTS: ${ASTER_COMMUNICATION_MAX_ATTACHMENTS:-16}

services:
  postgres:
    image: postgres:17-alpine
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aster}
      POSTGRES_USER: ${POSTGRES_USER:-aster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aster}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment: *api-environment
    volumes:
      - aster-media:/var/lib/aster/media
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./apps/api
    command:
      - python
      - -m
      - app.automation_worker
    restart: unless-stopped
    environment: *api-environment
    volumes:
      - aster-media:/var/lib/aster/media
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - test
        - -f
        - /tmp/aster-worker-ready
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      ASTER_API_INTERNAL_URL: ${ASTER_API_INTERNAL_URL:-http://api:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  aster-media:
