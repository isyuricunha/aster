name: aster

services:
  postgres:
    image: postgres:17-alpine
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aster}
      POSTGRES_USER: ${POSTGRES_USER:-aster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aster}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-aster}
      POSTGRES_USER: ${POSTGRES_USER:-aster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aster}
      ASTER_ENCRYPTION_KEY: ${ASTER_ENCRYPTION_KEY}
      ASTER_CORS_ORIGINS: ${ASTER_CORS_ORIGINS:-http://localhost:3000}
      ASTER_ENDPOINT_TIMEOUT_SECONDS: ${ASTER_ENDPOINT_TIMEOUT_SECONDS:-30}
      ASTER_STREAM_TIMEOUT_SECONDS: ${ASTER_STREAM_TIMEOUT_SECONDS:-120}
      ASTER_SESSION_COOKIE_NAME: ${ASTER_SESSION_COOKIE_NAME:-aster_session}
      ASTER_SESSION_SECURE: ${ASTER_SESSION_SECURE:-false}
      ASTER_SESSION_ABSOLUTE_DAYS: ${ASTER_SESSION_ABSOLUTE_DAYS:-30}
      ASTER_SESSION_IDLE_HOURS: ${ASTER_SESSION_IDLE_HOURS:-168}
      ASTER_SESSION_TOUCH_SECONDS: ${ASTER_SESSION_TOUCH_SECONDS:-300}
      ASTER_LOGIN_ATTEMPTS: ${ASTER_LOGIN_ATTEMPTS:-5}
      ASTER_LOGIN_WINDOW_SECONDS: ${ASTER_LOGIN_WINDOW_SECONDS:-300}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      ASTER_API_INTERNAL_URL: ${ASTER_API_INTERNAL_URL:-http://api:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
