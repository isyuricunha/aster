name: Format autonomous agent backend

on:
  push:
    branches:
      - autonomous-agents
    paths:
      - .github/workflows/agent-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: autonomous-agents
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --frozen --group dev
      - name: Format new backend files
        working-directory: apps/api
        run: |
          uv run ruff check --fix \
            app/agent_*.py \
            app/routes/agent_*.py \
            app/routes/agents.py \
            migrations/versions/0016_autonomous_agents.py
          uv run ruff format \
            app/agent_*.py \
            app/routes/agent_*.py \
            app/routes/agents.py \
            migrations/versions/0016_autonomous_agents.py
      - name: Commit formatting
        run: |
          git config user.name "isyuricunha"
          git config user.email "115634315+isyuricunha@users.noreply.github.com"
          git add apps/api
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format autonomous agent backend"
          git push origin HEAD:autonomous-agents
