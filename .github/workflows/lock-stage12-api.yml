name: Lock Stage 12 API

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lock:
    if: >-
      github.head_ref == 'tools-and-mcp' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Stage 12 branch
        uses: actions/checkout@v4
        with:
          ref: tools-and-mcp
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Resolve API dependencies
        working-directory: apps/api
        run: uv lock
      - name: Commit the lock file
        run: |
          git config user.name 'isyuricunha'
          git config user.email '115634315+isyuricunha@users.noreply.github.com'
          git add apps/api/uv.lock
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'chore(api): lock dependencies'
          git push origin HEAD:tools-and-mcp
