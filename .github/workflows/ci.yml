name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  apply-skills-patch:
    name: Apply Skills Audit
    if: ${{ github.event_name == 'pull_request' && github.head_ref == 'feature/skills-audit' && !contains(github.event.pull_request.title, '[applied]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/skills-audit
          fetch-depth: 0
      - name: Rebuild patch from temporary issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: "47"
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request

          repository = os.environ["REPOSITORY"]
          issue_number = os.environ["ISSUE_NUMBER"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def get(url: str):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          issue = get(f"https://api.github.com/repos/{repository}/issues/{issue_number}")
          comments = []
          page = 1
          while True:
              items = get(
                  f"https://api.github.com/repos/{repository}/issues/"
                  f"{issue_number}/comments?per_page=100&page={page}"
              )
              if not items:
                  break
              comments.extend(items)
              page += 1
          comments.sort(key=lambda item: (item["created_at"], item["id"]))

          bodies = [issue["body"], *(item["body"] for item in comments)]
          with open("/tmp/skills-audit.patch", "wb") as target:
              for body in bodies:
                  marker, separator, payload = body.partition("\n")
                  if not separator:
                      raise RuntimeError("Unexpected temporary patch payload.")
                  if marker == "ASTER_PATCH_CHUNK":
                      target.write(payload.encode("utf-8"))
                  elif marker == "ASTER_PATCH_B64":
                      target.write(base64.b64decode(payload, validate=True))
                  else:
                      raise RuntimeError(f"Unexpected patch marker: {marker}")
          PY
      - name: Apply and push implementation
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git apply --check /tmp/skills-audit.patch
          git apply /tmp/skills-audit.patch
          chmod +x scripts/ci/check-stage18-skills.sh
          rm -rf .github/skills-patch
          rm -f .github/workflows/export-source-temp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement first-class Skills Audit"
          git push origin HEAD:feature/skills-audit

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Lint
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee /tmp/web-lint.log
      - name: Type check
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee /tmp/web-typecheck.log
      - name: Build
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee /tmp/web-build.log
      - name: Upload web check logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-check-logs
          path: |
            /tmp/web-lint.log
            /tmp/web-typecheck.log
            /tmp/web-build.log
          if-no-files-found: ignore

  api:
    name: API
    runs-on: ubuntu-latest
    env:
      ASTER_ENCRYPTION_KEY: tests-only-encryption-key-with-32-characters
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Lint
        run: |
          set -o pipefail
          uv run ruff check . 2>&1 | tee /tmp/ruff.log
      - name: Test
        run: |
          set -o pipefail
          uv run pytest 2>&1 | tee /tmp/pytest.log
      - name: Upload API check logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-check-logs
          path: |
            /tmp/ruff.log
            /tmp/pytest.log
          if-no-files-found: ignore
      - name: Validate migrations
        run: uv run alembic upgrade head --sql > /tmp/aster-migrations.sql

  compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Prepare environment
        run: cp .env.example .env
      - name: Validate bundled database configuration
        run: docker compose config --quiet
      - name: Validate external database configuration
        env:
          COMPOSE_PROFILES: ""
          DATABASE_URL: postgresql+asyncpg://aster:aster@database.invalid:5432/aster
        run: docker compose config --quiet
      - name: Build images
        run: docker compose build --progress=plain api worker web
      - name: Start application stack
        run: docker compose up --detach
      - name: Check API readiness
        run: >-
          curl --fail --silent --show-error --retry 30 --retry-all-errors --retry-delay 2
          http://localhost:8000/ready
      - name: Check web readiness
        run: >-
          curl --fail --silent --show-error --retry 30 --retry-all-errors --retry-delay 2
          http://localhost:3000/setup
      - name: Check legacy upgrade through Stage 17
        run: sh scripts/ci/check-stage11-persona-migration.sh
      - name: Check runtime configuration
        run: sh scripts/ci/check-runtime.sh
      - name: Check core application contracts
        run: sh scripts/ci/check-stack-core.sh
      - name: Check Stage 13 memory and retrieval contracts
        run: sh scripts/ci/check-stage13-memory-rag.sh
      - name: Check Stage 14 image contracts
        run: sh scripts/ci/check-stage14-images.sh
      - name: Check Stage 15 automation contracts
        run: sh scripts/ci/check-stage15-automations.sh
      - name: Check Stage 16 communication contracts
        run: sh scripts/ci/check-stage16-communications.sh
      - name: Check Stage 17 autonomous agent contracts
        run: sh scripts/ci/check-stage17-agents.sh
      - name: Check Stage 12 tool contracts
        run: sh scripts/ci/check-stage12-tools.sh
      - name: Show service state
        if: always()
        run: docker compose ps
      - name: Save service logs
        if: failure()
        run: docker compose logs --no-color > /tmp/compose.log 2>&1
      - name: Show service logs
        if: failure()
        run: cat /tmp/compose.log
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: /tmp/compose.log
          if-no-files-found: ignore
      - name: Stop application stack
        if: always()
        run: docker compose down --volumes --remove-orphans
