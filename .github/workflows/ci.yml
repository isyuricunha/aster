name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  api:
    name: API
    runs-on: ubuntu-latest
    env:
      ASTER_ENCRYPTION_KEY: tests-only-encryption-key-with-32-characters
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Validate migrations
        run: uv run alembic upgrade head --sql > /tmp/aster-migrations.sql

  compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Validate configuration
        run: docker compose config --quiet

      - name: Build API image
        run: docker compose build --progress=plain api

      - name: Build web image
        run: docker compose build --progress=plain web

      - name: Start application stack
        run: docker compose up --detach

      - name: Check API readiness
        run: >-
          curl --fail --silent --show-error
          --retry 30 --retry-all-errors --retry-delay 2
          http://localhost:8000/ready

      - name: Check model settings API
        run: >-
          curl --fail --silent --show-error
          http://localhost:8000/api/model-endpoints

      - name: Check persona API
        run: >-
          curl --fail --silent --show-error
          http://localhost:8000/api/persona

      - name: Check message composition preview
        run: >-
          curl --fail --silent --show-error
          --header 'Content-Type: application/json'
          --data '{"user_message":"Hello"}'
          http://localhost:8000/api/message-composition/preview
          | grep --quiet '"role":"user"'

      - name: Check model settings page
        run: >-
          curl --fail --silent --show-error
          --retry 30 --retry-all-errors --retry-delay 2
          http://localhost:3000/settings/models

      - name: Check persona settings page
        run: >-
          curl --fail --silent --show-error
          --retry 30 --retry-all-errors --retry-delay 2
          http://localhost:3000/settings/persona

      - name: Show service state
        if: always()
        run: docker compose ps

      - name: Show service logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop application stack
        if: always()
        run: docker compose down --volumes --remove-orphans
