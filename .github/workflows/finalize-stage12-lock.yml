name: Finalize Stage 12 Lock

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.head_ref == 'tools-and-mcp' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Stage 12 branch
        uses: actions/checkout@v4
        with:
          ref: tools-and-mcp
      - name: Freeze the API lock in CI
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/ci.yml')
          content = path.read_text()
          content = content.replace(
              '      - name: Install dependencies\n        run: uv sync --group dev\n'
              '      - name: Upload resolved API lock\n'
              '        uses: actions/upload-artifact@v4\n'
              '        with:\n'
              '          name: api-uv-lock\n'
              '          path: apps/api/uv.lock\n'
              '          if-no-files-found: error\n',
              '      - name: Install dependencies\n'
              '        run: uv sync --frozen --group dev\n',
          )
          path.write_text(content)
          PY
      - name: Commit the frozen workflow
        run: |
          git config user.name 'isyuricunha'
          git config user.email '115634315+isyuricunha@users.noreply.github.com'
          git add .github/workflows/ci.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'ci: enforce the API lock'
          git push origin HEAD:tools-and-mcp
