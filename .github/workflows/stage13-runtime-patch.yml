name: Apply Stage 13 Runtime Integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.head_ref == 'memory-and-rag' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Stage 13 branch
        uses: actions/checkout@v4
        with:
          ref: memory-and-rag
          fetch-depth: 0
      - name: Patch retrieval into chat generation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              content = target.read_text()
              if old not in content:
                  if new in content:
                      return
                  raise SystemExit(f"Expected block not found in {path}: {old[:80]!r}")
              target.write_text(content.replace(old, new))

          replace(
              "apps/api/app/chat_generation.py",
              "from dataclasses import dataclass\n",
              "from dataclasses import dataclass, field\n",
          )
          replace(
              "apps/api/app/chat_generation.py",
              "    stop_event: asyncio.Event\n",
              "    stop_event: asyncio.Event\n"
              "    retrieval_context: str = \"\"\n"
              "    retrieval_sources: list[dict[str, object]] = field(default_factory=list)\n",
          )
          replace(
              "apps/api/app/chat_generation.py",
              '                "model": _target_payload(prepared.model_targets[0]),\n',
              '                "model": _target_payload(prepared.model_targets[0]),\n'
              '                "retrieval_sources": prepared.retrieval_sources,\n',
          )
          replace(
              "apps/api/app/chat_generation.py",
              "            provider_messages = _provider_messages(canonical_messages)\n\n",
              "            provider_messages = _provider_messages(canonical_messages)\n"
              "            if prepared.retrieval_context:\n"
              "                provider_messages.insert(\n"
              "                    max(0, len(provider_messages) - 1),\n"
              "                    {\"role\": \"developer\", \"content\": prepared.retrieval_context},\n"
              "                )\n\n",
          )

          replace(
              "apps/api/app/routes/chat.py",
              "from app.chat_generation import (\n",
              "from app.chat_generation import (\n    PreparedGeneration,\n",
          )
          replace(
              "apps/api/app/routes/chat.py",
              "from app.db import get_session\n",
              "from app.config import settings\nfrom app.db import get_session\n",
          )
          replace(
              "apps/api/app/routes/chat.py",
              "from app.retrieval_service import (\n"
              "    get_or_create_conversation_settings,\n"
              "    replace_conversation_retrieval_settings,\n"
              ")\n",
              "from app.retrieval_service import (\n"
              "    get_or_create_conversation_settings,\n"
              "    prepare_retrieval,\n"
              "    replace_conversation_retrieval_settings,\n"
              ")\n",
          )
          replace(
              "apps/api/app/routes/chat.py",
              "def _contains_pattern(value: str) -> str:\n",
              "async def _attach_retrieval(\n"
              "    prepared: PreparedGeneration,\n"
              "    *,\n"
              "    session: AsyncSession,\n"
              "    client: OpenAICompatibleClient,\n"
              "    cipher: SecretCipher,\n"
              ") -> None:\n"
              "    retrieval = await prepare_retrieval(\n"
              "        session,\n"
              "        conversation=prepared.conversation,\n"
              "        assistant_message=prepared.assistant_message,\n"
              "        query=prepared.current_user_message.content,\n"
              "        client=client,\n"
              "        cipher=cipher,\n"
              "        settings=settings,\n"
              "    )\n"
              "    prepared.retrieval_context = retrieval.context\n"
              "    prepared.retrieval_sources = [\n"
              "        source.model_dump(mode=\"json\") for source in retrieval.sources\n"
              "    ]\n\n\n"
              "def _contains_pattern(value: str) -> str:\n",
          )
          for marker in (
              "    return await stream_response_with_tools(\n",
          ):
              pass
          replace(
              "apps/api/app/routes/chat.py",
              "    return await stream_response_with_tools(\n"
              "        prepared=prepared,\n"
              "        session=session,\n"
              "        client=client,\n"
              "        mcp_client=mcp_client,\n"
              "        cipher=cipher,\n"
              "    )\n\n\n@router.post(\"/conversations/{conversation_id}/messages/{message_id}/edit-and-resend\")",
              "    await _attach_retrieval(\n"
              "        prepared, session=session, client=client, cipher=cipher\n"
              "    )\n"
              "    return await stream_response_with_tools(\n"
              "        prepared=prepared,\n"
              "        session=session,\n"
              "        client=client,\n"
              "        mcp_client=mcp_client,\n"
              "        cipher=cipher,\n"
              "    )\n\n\n@router.post(\"/conversations/{conversation_id}/messages/{message_id}/edit-and-resend\")",
          )
          replace(
              "apps/api/app/routes/chat.py",
              "    return await stream_response_with_tools(\n"
              "        prepared=prepared,\n"
              "        session=session,\n"
              "        client=client,\n"
              "        mcp_client=mcp_client,\n"
              "        cipher=cipher,\n"
              "    )\n\n\n@router.post(\"/conversations/{conversation_id}/messages/{message_id}/regenerate\")",
              "    await _attach_retrieval(\n"
              "        prepared, session=session, client=client, cipher=cipher\n"
              "    )\n"
              "    return await stream_response_with_tools(\n"
              "        prepared=prepared,\n"
              "        session=session,\n"
              "        client=client,\n"
              "        mcp_client=mcp_client,\n"
              "        cipher=cipher,\n"
              "    )\n\n\n@router.post(\"/conversations/{conversation_id}/messages/{message_id}/regenerate\")",
          )
          replace(
              "apps/api/app/routes/chat.py",
              "    return await stream_response_with_tools(\n"
              "        prepared=prepared,\n"
              "        session=session,\n"
              "        client=client,\n"
              "        mcp_client=mcp_client,\n"
              "        cipher=cipher,\n"
              "    )\n\n\n@router.post(\"/messages/{message_id}/stop\"",
              "    await _attach_retrieval(\n"
              "        prepared, session=session, client=client, cipher=cipher\n"
              "    )\n"
              "    return await stream_response_with_tools(\n"
              "        prepared=prepared,\n"
              "        session=session,\n"
              "        client=client,\n"
              "        mcp_client=mcp_client,\n"
              "        cipher=cipher,\n"
              "    )\n\n\n@router.post(\"/messages/{message_id}/stop\"",
          )

          replace(
              "apps/api/app/tool_generation.py",
              "from app.security import SecretCipher\n",
              "from app.retrieval_service import (\n"
              "    context_for_message,\n"
              "    copy_retrieval_usages,\n"
              ")\n"
              "from app.security import SecretCipher\n",
          )
          replace(
              "apps/api/app/tool_generation.py",
              "def _provider_history(\n"
              "    conversation: Conversation,\n"
              "    messages: Sequence[ChatMessage],\n"
              ") -> list[dict[str, object]]:\n",
              "def _provider_history(\n"
              "    conversation: Conversation,\n"
              "    messages: Sequence[ChatMessage],\n"
              "    retrieval_context: str = \"\",\n"
              ") -> list[dict[str, object]]:\n",
          )
          replace(
              "apps/api/app/tool_generation.py",
              "    result.extend(\n"
              "        _provider_message(message) for message in messages if _include_in_provider_history(message)\n"
              "    )\n",
              "    if retrieval_context:\n"
              "        result.append({\"role\": \"developer\", \"content\": retrieval_context})\n"
              "    result.extend(\n"
              "        _provider_message(message) for message in messages if _include_in_provider_history(message)\n"
              "    )\n",
          )
          replace(
              "apps/api/app/tool_generation.py",
              "        provider_messages=_provider_history(prepared.conversation, initial_messages),\n",
              "        provider_messages=_provider_history(\n"
              "            prepared.conversation, initial_messages, prepared.retrieval_context\n"
              "        ),\n",
          )
          replace(
              "apps/api/app/tool_generation.py",
              '                "tools_enabled": len(runtimes),\n',
              '                "tools_enabled": len(runtimes),\n'
              '                "retrieval_sources": prepared.retrieval_sources,\n',
          )
          replace(
              "apps/api/app/tool_generation.py",
              "    await _move_registration(state, next_assistant)\n",
              "    await copy_retrieval_usages(\n"
              "        session,\n"
              "        source_message_id=state.assistant_message.id,\n"
              "        target_message_id=next_assistant.id,\n"
              "    )\n"
              "    await _move_registration(state, next_assistant)\n",
          )
          replace(
              "apps/api/app/tool_generation.py",
              "        stop_event = await generation_registry.register(next_assistant.id)\n",
              "        await copy_retrieval_usages(\n"
              "            session,\n"
              "            source_message_id=assistant_message.id,\n"
              "            target_message_id=next_assistant.id,\n"
              "        )\n"
              "        stop_event = await generation_registry.register(next_assistant.id)\n",
          )
          replace(
              "apps/api/app/tool_generation.py",
              "        state = ToolLoopState(\n"
              "            conversation=conversation,\n"
              "            assistant_message=next_assistant,\n"
              "            provider_messages=_provider_history(conversation, history),\n",
              "        retrieval_context = await context_for_message(\n"
              "            session, assistant_message.id\n"
              "        )\n"
              "        state = ToolLoopState(\n"
              "            conversation=conversation,\n"
              "            assistant_message=next_assistant,\n"
              "            provider_messages=_provider_history(\n"
              "                conversation, history, retrieval_context\n"
              "            ),\n",
          )
          PY
      - name: Resolve the API lock
        run: |
          python -m pip install --disable-pip-version-check uv
          cd apps/api
          uv lock
      - name: Commit the runtime integration
        run: |
          git config user.name 'isyuricunha'
          git config user.email '115634315+isyuricunha@users.noreply.github.com'
          git add apps/api/app/chat_generation.py apps/api/app/routes/chat.py \
            apps/api/app/tool_generation.py apps/api/uv.lock
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'feat(rag): integrate retrieval with chat generation'
          git push origin HEAD:memory-and-rag
