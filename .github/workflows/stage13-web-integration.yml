name: Apply Stage 13 Web Integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.head_ref == 'memory-and-rag' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Stage 13 branch
        uses: actions/checkout@v4
        with:
          ref: memory-and-rag
      - name: Patch chat and transfer contracts
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              content = target.read_text()
              if old not in content:
                  if new in content:
                      return
                  raise SystemExit(f'Expected block not found in {path}: {old[:80]!r}')
              target.write_text(content.replace(old, new))

          replace(
              'apps/web/src/lib/api.ts',
              'export type ChatMessage = {\n',
              'export type RetrievalSource = {\n'
              '  id: string;\n'
              '  kind: "memory" | "document";\n'
              '  rank: number;\n'
              '  score: number | null;\n'
              '  label: string;\n'
              '  content: string;\n'
              '  memory_id: string | null;\n'
              '  chunk_id: string | null;\n'
              '};\n\n'
              'export type ConversationRetrieval = {\n'
              '  memory_enabled: boolean;\n'
              '  rag_enabled: boolean;\n'
              '  collection_ids: string[];\n'
              '  collection_names: string[];\n'
              '};\n\n'
              'export type ChatMessage = {\n',
          )
          replace(
              'apps/web/src/lib/api.ts',
              '  tool_name?: string | null;\n  position: number;\n',
              '  tool_name?: string | null;\n'
              '  retrieval_sources?: RetrievalSource[];\n'
              '  position: number;\n',
          )
          replace(
              'apps/web/src/lib/api.ts',
              '  persona?: ConversationPersona | null;\n  messages: ChatMessage[];\n',
              '  persona?: ConversationPersona | null;\n'
              '  retrieval?: ConversationRetrieval;\n'
              '  messages: ChatMessage[];\n',
          )
          replace(
              'apps/web/src/lib/api.ts',
              '  version: 1 | 2 | 3;\n  title: string;\n  persona?: ConversationPersona | null;\n',
              '  version: 1 | 2 | 3 | 4;\n'
              '  title: string;\n'
              '  persona?: ConversationPersona | null;\n'
              '  retrieval?: {\n'
              '    memory_enabled: boolean;\n'
              '    rag_enabled: boolean;\n'
              '    collection_names: string[];\n'
              '  } | null;\n',
          )

          replace(
              'apps/web/src/app/conversation-transfer.ts',
              '    version: 3,\n    title: conversation.title,\n    persona: conversation.persona,\n',
              '    version: 4,\n'
              '    title: conversation.title,\n'
              '    persona: conversation.persona,\n'
              '    retrieval: conversation.retrieval\n'
              '      ? {\n'
              '          memory_enabled: conversation.retrieval.memory_enabled,\n'
              '          rag_enabled: conversation.retrieval.rag_enabled,\n'
              '          collection_names: conversation.retrieval.collection_names,\n'
              '        }\n'
              '      : null,\n',
          )
          replace(
              'apps/web/src/app/conversation-transfer.ts',
              '    (value.version !== 1 && value.version !== 2 && value.version !== 3)\n',
              '    (value.version !== 1 &&\n'
              '      value.version !== 2 &&\n'
              '      value.version !== 3 &&\n'
              '      value.version !== 4)\n',
          )
          replace(
              'apps/web/src/app/conversation-transfer.ts',
              '  if (value.version === 1 && "persona" in value) {\n'
              '    throw new Error("Version 1 conversation exports cannot contain a persona snapshot.");\n'
              '  }\n\n',
              '  if (value.version === 1 && "persona" in value) {\n'
              '    throw new Error("Version 1 conversation exports cannot contain a persona snapshot.");\n'
              '  }\n'
              '  if (value.version >= 4) {\n'
              '    if (value.retrieval !== null && !isConversationRetrieval(value.retrieval)) {\n'
              '      throw new Error("The exported conversation contains invalid retrieval settings.");\n'
              '    }\n'
              '  } else if ("retrieval" in value) {\n'
              '    throw new Error("Retrieval settings require conversation export version 4.");\n'
              '  }\n\n',
          )
          replace(
              'apps/web/src/app/conversation-transfer.ts',
              'function isTransferMessage(value: unknown, version: 1 | 2 | 3): value is ConversationTransferMessage {\n',
              'function isConversationRetrieval(value: unknown): boolean {\n'
              '  if (!isRecord(value)) return false;\n'
              '  return (\n'
              '    typeof value.memory_enabled === "boolean" &&\n'
              '    typeof value.rag_enabled === "boolean" &&\n'
              '    Array.isArray(value.collection_names) &&\n'
              '    value.collection_names.every((name) => typeof name === "string")\n'
              '  );\n'
              '}\n\n'
              'function isTransferMessage(\n'
              '  value: unknown,\n'
              '  version: 1 | 2 | 3 | 4,\n'
              '): value is ConversationTransferMessage {\n',
          )
          replace(
              'apps/web/src/app/conversation-transfer.ts',
              '(version === 3 && value.role === "tool")',
              '(version >= 3 && value.role === "tool")',
          )

          replace(
              'apps/web/src/app/chat-shell.tsx',
              'import { ToolCallList, ToolExecutionCard } from "./chat-tool-cards";\n',
              'import { RetrievalSourceList } from "./chat-retrieval-sources";\n'
              'import { ToolCallList, ToolExecutionCard } from "./chat-tool-cards";\n',
          )
          replace(
              'apps/web/src/app/chat-shell.tsx',
              'import { copyText, MarkdownMessage } from "./markdown-message";\n',
              'import { copyText, MarkdownMessage } from "./markdown-message";\n'
              'import type { RetrievalSource } from "../lib/retrieval-api";\n',
          )
          replace(
              'apps/web/src/app/chat-shell.tsx',
              '  assistant_message_id: string;\n};\n',
              '  assistant_message_id: string;\n'
              '  retrieval_sources?: RetrievalSource[];\n'
              '};\n',
          )
          replace(
              'apps/web/src/app/chat-shell.tsx',
              '  return messages.map((message) => (message.id === nextMessage.id ? nextMessage : message));\n',
              '  return messages.map((message) =>\n'
              '    message.id === nextMessage.id\n'
              '      ? {\n'
              '          ...nextMessage,\n'
              '          retrieval_sources:\n'
              '            nextMessage.retrieval_sources ?? message.retrieval_sources,\n'
              '        }\n'
              '      : message,\n'
              '  );\n',
          )
          replace(
              'apps/web/src/app/chat-shell.tsx',
              '        return {\n'
              '          id: meta.conversation_id,\n'
              '          title: meta.title,\n'
              '          persona: current?.persona ?? null,\n'
              '          messages: [...retained, ...meta.messages],\n',
              '        const incoming = meta.messages.map((message) =>\n'
              '          message.id === meta.assistant_message_id\n'
              '            ? { ...message, retrieval_sources: meta.retrieval_sources ?? [] }\n'
              '            : message,\n'
              '        );\n'
              '        return {\n'
              '          id: meta.conversation_id,\n'
              '          title: meta.title,\n'
              '          persona: current?.persona ?? null,\n'
              '          retrieval: current?.retrieval,\n'
              '          messages: [...retained, ...incoming],\n',
          )
          replace(
              'apps/web/src/app/chat-shell.tsx',
              '          <Link href="/settings/tools">\n'
              '            <Icon name="tools" />\n'
              '            <span>Tools</span>\n'
              '          </Link>\n',
              '          <Link href="/settings/tools">\n'
              '            <Icon name="tools" />\n'
              '            <span>Tools</span>\n'
              '          </Link>\n'
              '          <Link href="/settings/memory">\n'
              '            <Icon name="memory" />\n'
              '            <span>Memory & Knowledge</span>\n'
              '          </Link>\n',
          )
          replace(
              'apps/web/src/app/chat-shell.tsx',
              '{executions.map((execution) => (\n',
              '<RetrievalSourceList sources={message.retrieval_sources ?? []} />\n'
              '                           {executions.map((execution) => (\n',
          )
          PY
      - name: Commit the web integration
        run: |
          git config user.name 'isyuricunha'
          git config user.email '115634315+isyuricunha@users.noreply.github.com'
          git add apps/web/src/lib/api.ts apps/web/src/app/chat-shell.tsx \
            apps/web/src/app/conversation-transfer.ts
          git commit -m 'feat(rag): integrate retrieval provenance with chat'
          git push origin HEAD:memory-and-rag
